<!DOCTYPE html>
<html>
<head>
    <title>AI Analyzer</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🔐 Login / Signup</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Signup</button>
    <button onclick="login()">Login</button>

    <hr>

    <div id="app" class="hidden">

        <h2>🧠 AI Analyzer</h2>

        <textarea id="text" placeholder="How are you feeling?"></textarea>

        <input id="screen" placeholder="Screen Time">
        <input id="sleep" placeholder="Sleep">
        <input id="study" placeholder="Study">
        <input id="stress" placeholder="Stress">

        <button onclick="analyze()">Analyze</button>

        <pre id="result"></pre>
        <img id="graph" width="100%">
    </div>

</div>

<script>

// ---------------- LOGIN ----------------
async function login() {
    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    });

    const data = await res.json();

    if (data.user_id) {
        localStorage.setItem("user_id", data.user_id);

        alert("Login success");

        document.getElementById("app").classList.remove("hidden");
    } else {
        alert("Login failed");
    }
}

// ---------------- SIGNUP ----------------
async function signup() {
    const res = await fetch("/signup", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    });

    const data = await res.json();
    alert(data.message);
}

// ---------------- ANALYZE ----------------
async function analyze() {

    if (!localStorage.getItem("user_id")) {
        alert("Please login first");
        return;
    }

    const res = await fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            user_id: localStorage.getItem("user_id"),  // 🔥 IMPORTANT
            text: text.value,
            screen_time: screen.value,
            sleep: sleep.value,
            study: study.value,
            stress: stress.value
        })
    });

    const data = await res.json();

    result.innerText =
        "Personality: " + data.personality + "\n" +
        "Confidence: " + data.confidence + "%\n" +
        "Score: " + data.score + "\n" +
        "Progress: " + data.progress + "\n" +
        "Suggestion: " + data.suggestion;

    if (data.graph) {
        graph.src = data.graph;
    }
}

// AUTO LOGIN IF ALREADY LOGGED
if (localStorage.getItem("user_id")) {
    document.getElementById("app").classList.remove("hidden");
}

</script>

</body>
</html>
