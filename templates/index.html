<!DOCTYPE html>
<html>
<head>
    <title>AI Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Animated background blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .blob1 {
            width: 400px;
            height: 400px;
            background: #7c3aed;
            top: -100px;
            left: -100px;
        }

        .blob2 {
            width: 350px;
            height: 350px;
            background: #2563eb;
            bottom: -80px;
            right: -80px;
        }

        .blob3 {
            width: 250px;
            height: 250px;
            background: #a78bfa;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .container {
            position: relative;
            z-index: 1;
            background: #1a1a2e;
            border: 1px solid #2d2d4e;
            padding: 36px 32px;
            border-radius: 20px;
            width: 360px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 8px;
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .logo p {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .input-wrap {
            margin-bottom: 12px;
        }

        .input-wrap label {
            display: block;
            font-size: 11px;
            color: #6b7280;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: #0f0f1a;
            border: 1px solid #2d2d4e;
            border-radius: 10px;
            color: #e0e0ff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #7c3aed;
        }

        input::placeholder {
            color: #4b5563;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            color: white;
            margin-top: 20px;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #2d2d4e;
            color: #9ca3af;
            margin-top: 8px;
        }

        .btn-secondary:hover {
            border-color: #7c3aed;
            color: #a78bfa;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 16px 0;
            color: #4b5563;
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2d2d4e;
        }

        .error-msg {
            color: #f87171;
            font-size: 12px;
            text-align: center;
            min-height: 16px;
            margin-top: 10px;
        }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: #4b5563;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<!-- Background blobs -->
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="container">
    <div class="logo">
        <span class="logo-icon">🔥</span>
        <h1>AI Analyzer</h1>
        <p>Track your wellness every day</p>
    </div>

    <div class="input-wrap">
        <label>Username</label>
        <input id="username" placeholder="Enter your username" autocomplete="username">
    </div>
    <div class="input-wrap">
        <label>Password</label>
        <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
    </div>

    <div class="error-msg" id="error-msg"></div>

    <button class="btn btn-primary" id="loginBtn" onclick="login()">Login</button>

    <div class="divider">or</div>

    <button class="btn btn-secondary" id="signupBtn" onclick="signup()">Create Account</button>

    <div class="footer-text">Your data stays private 🔒</div>
</div>

<script>
    async function login() {
        const btn = document.getElementById("loginBtn");
        const errorEl = document.getElementById("error-msg");
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        errorEl.innerText = "";

        if (!username || !password) {
            errorEl.innerText = "⚠️ Please fill in both fields.";
            return;
        }

        btn.disabled = true;
        btn.innerText = "Logging in...";

        try {
            const res = await fetch("/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();

            if (data.message === "Login success") {
                localStorage.setItem("user_id", data.user_id);
                localStorage.setItem("username", data.username);
                window.location.href = "/dashboard";
            } else {
                errorEl.innerText = "❌ Invalid username or password.";
            }
        } catch (e) {
            errorEl.innerText = "❌ Could not reach server. Try again.";
        } finally {
            btn.disabled = false;
            btn.innerText = "Login";
        }
    }

    async function signup() {
        const btn = document.getElementById("signupBtn");
        const errorEl = document.getElementById("error-msg");
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        errorEl.innerText = "";

        if (!username || !password) {
            errorEl.innerText = "⚠️ Please fill in both fields.";
            return;
        }
        if (password.length < 3) {
            errorEl.innerText = "⚠️ Password must be at least 3 characters.";
            return;
        }

        btn.disabled = true;
        btn.innerText = "Creating account...";

        try {
            const res = await fetch("/signup", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();

            if (data.message === "Signup success") {
                localStorage.setItem("user_id", data.user_id);
                localStorage.setItem("username", username);
                window.location.href = "/dashboard";
            } else if (data.message === "User exists") {
                errorEl.innerText = "❌ Username already taken. Try another.";
            } else {
                errorEl.innerText = "❌ " + (data.message || "Signup failed.");
            }
        } catch (e) {
            errorEl.innerText = "❌ Could not reach server. Try again.";
        } finally {
            btn.disabled = false;
            btn.innerText = "Create Account";
        }
    }

    // Allow Enter key to login
    document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
    });
</script>

</body>
</html>
