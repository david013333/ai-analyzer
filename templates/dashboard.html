<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .box {
            background: rgba(0,0,0,0.25);
            padding: 25px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        img {
            margin-top: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>🔥 AI Analyzer Dashboard</h2>

    <input id="screen" placeholder="Screen Time (hrs)">
    <input id="sleep" placeholder="Sleep (hrs)">
    <input id="study" placeholder="Study (hrs)">
    <input id="stress" placeholder="Stress (1-10)">
    <textarea id="text" placeholder="Write something..."></textarea>

    <button onclick="analyze()">Analyze</button>

    <h3 id="result"></h3>
    <img id="graph" width="100%">
    <h3 id="trend" style="color:white; margin-top:10px;"></h3>
    <p id="advice" style="color:white;"></p>

</div>
<script>
async function analyze() {

    let screen = document.getElementById("screen").value;
    let sleep = document.getElementById("sleep").value;
    let study = document.getElementById("study").value;
    let stress = document.getElementById("stress").value;
    let text = document.getElementById("text").value;

    // 🚨 VALIDATION
    if (!screen || !sleep || !study || !stress || !text) {
        alert("Sab fields fill kar");
        return;
    }

    const res = await fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            user_id: localStorage.getItem("user_id"),
            screen_time: screen,
            sleep: sleep,
            study: study,
            stress: stress,
            text: text
        })
    });

    const data = await res.json();
    document.getElementById("graph").src = data.graph || "";
    document.getElementById("trend").innerText = data.trend;
    document.getElementById("advice").innerText = data.advice;

    document.getElementById("result").innerHTML = `
        Personality: ${data.personality} <br>
        Score: ${data.score} <br>
        ${data.suggestion}
    `;

    if (data.graph) {
        document.getElementById("graph").src = data.graph;
    }
}
</script>
</body>
</html>
